<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FFmpeg Studio Web - Final Fix</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
        .status-badge { font-size: 10px; font-weight: bold; padding: 5px 12px; border-radius: 20px; text-transform: uppercase; }
        .red { background: #450a0a; color: #ef4444; border: 1px solid #7f1d1d; }
        .green { background: #064e3b; color: #10b981; border: 1px solid #065f46; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        input[type="file"] { font-size: 12px; color: #94a3b8; margin-top: 5px; width: 100%; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; margin-top: 10px; }
        .btn-blue { background: #2563eb; } .btn-blue:hover { background: #1d4ed8; }
        .btn-teal { background: #0d9488; } .btn-teal:hover { background: #0f766e; }
        .progress-container { background: #020617; border-radius: 10px; padding: 15px; margin-top: 15px; }
        .progress-bar { height: 10px; background: #334155; border-radius: 5px; overflow: hidden; margin-top: 8px; }
        #fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s; }
        #log { background: #000; color: #39d353; font-family: monospace; font-size: 11px; height: 150px; overflow-y: auto; padding: 10px; border-radius: 8px; margin-top: 15px; }
        video { width: 100%; background: #000; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0 italic; font-size: 24px;">FFMPEG<span style="color:var(--accent)">.STUDIO</span></h1>
            <span id="badge" class="status-badge red">Seguridad Inactiva</span>
        </div>

        <div class="grid">
            <div class="controls">
                <div class="card">
                    <label style="font-size: 11px; font-weight: bold; color: #64748b;">PRINCIPAL (FOTO/VIDEO)</label>
                    <input type="file" id="f-main">
                    <label style="font-size: 11px; font-weight: bold; color: #64748b; display:block; margin-top:15px;">AUDIO (PARA UNIR)</label>
                    <input type="file" id="f-audio">
                </div>
                <div class="card">
                    <button onclick="run('merge')" class="btn btn-blue">📸 UNIR FOTO + AUDIO</button>
                    <button onclick="run('gif')" class="btn btn-teal">🖼️ CONVERTIR A GIF</button>
                </div>
            </div>

            <div class="preview">
                <video id="player" controls></video>
                
                <div class="progress-container">
                    <div style="display:flex; justify-content:space-between; font-size: 12px;">
                        <span id="status-txt">Listo para procesar</span>
                        <span id="pct">0%</span>
                    </div>
                    <div class="progress-bar"><div id="fill"></div></div>
                </div>

                <div id="log"> Esperando archivos...</div>
                <a id="dl" style="display:none; background:white; color:black; text-align:center; padding:12px; border-radius:8px; margin-top:15px; text-decoration:none; font-weight:bold; font-size:13px;">📥 DESCARGAR RESULTADO</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/esm/index.js';
        import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        
        if (window.crossOriginIsolated) {
            document.getElementById('badge').innerText = "Seguridad Activa";
            document.getElementById('badge').className = "status-badge green";
        }

        async function run(mode) {
            const file = document.getElementById('f-main').files[0];
            if (!file) return alert("Selecciona un archivo primero");

            try {
                if (!ffmpeg.loaded) {
                    document.getElementById('status-txt').innerText = "Descargando motor...";
                    await ffmpeg.load({
                        coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
                    });
                }

                ffmpeg.on('progress', ({ progress }) => {
                    const p = Math.round(progress * 100);
                    document.getElementById('fill').style.width = p + '%';
                    document.getElementById('pct').innerText = p + '%';
                });

                ffmpeg.on('log', ({ message }) => {
                    const l = document.getElementById('log');
                    l.innerHTML += `<div>> ${message}</div>`;
                    l.scrollTop = l.scrollHeight;
                });

                document.getElementById('status-txt').innerText = "Procesando...";
                await ffmpeg.writeFile('input', await fetchFile(file));
                let cmd = [], out = 'out.mp4';

                if (mode === 'merge') {
                    const aud = document.getElementById('f-audio').files[0];
                    if(!aud) return alert("Selecciona un audio");
                    await ffmpeg.writeFile('aud', await fetchFile(aud));
                    cmd = ['-loop', '1', '-i', 'input', '-i', 'aud', '-c:v', 'libx264', '-shortest', out];
                } else {
                    out = 'out.gif';
                    cmd = ['-i', 'input', '-vf', 'fps=10,scale=480:-1', out];
                }

                await ffmpeg.exec(cmd);
                const data = await ffmpeg.readFile(out);
                const url = URL.createObjectURL(new Blob([data.buffer], { type: mode==='gif'?'image/gif':'video/mp4' }));
                
                document.getElementById('player').src = url;
                const dl = document.getElementById('dl');
                dl.href = url; dl.download = out; dl.style.display = 'block';
                document.getElementById('status-txt').innerText = "¡Finalizado!";

            } catch (e) { 
                document.getElementById('log').innerHTML += `<div style="color:red">> ERROR: ${e.message}</div>`;
                console.error(e); 
            }
        }
        window.run = run;
    </script>
</body>
</html>
