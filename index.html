<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FFMPEG.STUDIO - FIX FINAL</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status { font-size: 10px; font-weight: bold; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; border: 1px solid currentColor; }
        .online { color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .offline { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        input[type="file"] { display: block; width: 100%; margin: 10px 0; font-size: 12px; color: #94a3b8; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; background: #2563eb; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .progress-box { background: #020617; border-radius: 8px; padding: 15px; margin: 15px 0; }
        .bar { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin-top: 8px; }
        #fill { height: 100%; width: 0%; background: var(--blue); transition: width 0.2s; }
        #log { background: #000; color: #10b981; font-family: monospace; font-size: 10px; height: 100px; overflow-y: auto; padding: 10px; border-radius: 8px; }
        video { width: 100%; border-radius: 8px; background: #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0 italic">FFMPEG<span style="color:var(--blue)">.STUDIO</span></h1>
            <span id="badge" class="status offline">Cargando Seguridad...</span>
        </div>

        <div class="card">
            <label style="font-size: 10px; color: #94a3b8; font-weight: bold;">ARCHIVOS</label>
            <input type="file" id="f-main">
            <input type="file" id="f-audio">
            <div style="display: flex; gap: 10px;">
                <button onclick="run('merge')" id="btn-merge">Unir Foto + Audio</button>
                <button onclick="run('gif')" id="btn-gif" style="background:#0d9488">Crear GIF</button>
            </div>
        </div>

        <div class="card">
            <video id="player" controls></video>
            <div class="progress-box">
                <div style="display:flex; justify-content:space-between; font-size: 11px;">
                    <span id="st-text">Listo</span>
                    <span id="st-pct">0%</span>
                </div>
                <div class="bar"><div id="fill"></div></div>
            </div>
            <div id="log"> Esperando archivos...</div>
            <a id="dl" style="display:none; background:white; color:black; text-align:center; padding:12px; border-radius:8px; margin-top:10px; text-decoration:none; font-weight:bold; font-size:12px;">DESCARGAR ARCHIVO</a>
        </div>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/+esm';
        import { fetchFile } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/+esm';

        const ffmpeg = new FFmpeg();

        if (window.crossOriginIsolated) {
            const b = document.getElementById('badge');
            b.innerText = "Seguridad Activa";
            b.className = "status online";
        }

        async function run(mode) {
            const main = document.getElementById('f-main').files[0];
            if (!main) return alert("Sube un archivo principal");

            const btn = document.querySelectorAll('button');
            btn.forEach(b => b.disabled = true);

            try {
                if (!ffmpeg.loaded) {
                    document.getElementById('st-text').innerText = "Cargando motor...";
                    await ffmpeg.load({
                        coreURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
                        workerURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/esm/worker.js'
                    });
                }

                ffmpeg.on('progress', ({ progress }) => {
                    const p = Math.round(progress * 100);
                    document.getElementById('fill').style.width = p + '%';
                    document.getElementById('st-pct').innerText = p + '%';
                });

                ffmpeg.on('log', ({ message }) => {
                    const l = document.getElementById('log');
                    l.innerHTML += `<div>> ${message}</div>`;
                    l.scrollTop = l.scrollHeight;
                });

                document.getElementById('st-text').innerText = "Procesando...";
                await ffmpeg.writeFile('input', await fetchFile(main));
                
                let cmd = [], out = 'out.mp4';
                if (mode === 'merge') {
                    const aud = document.getElementById('f-audio').files[0];
                    if(!aud) throw new Error("Selecciona un audio");
                    await ffmpeg.writeFile('aud', await fetchFile(aud));
                    cmd = ['-loop', '1', '-i', 'input', '-i', 'aud', '-c:v', 'libx264', '-shortest', out];
                } else {
                    out = 'out.gif';
                    cmd = ['-i', 'input', '-vf', 'fps=10,scale=480:-1', out];
                }

                await ffmpeg.exec(cmd);
                const data = await ffmpeg.readFile(out);
                const url = URL.createObjectURL(new Blob([data.buffer], { type: mode==='gif'?'image/gif':'video/mp4' }));
                
                document.getElementById('player').src = url;
                const dl = document.getElementById('dl');
                dl.href = url; dl.download = out; dl.style.display = 'block';
                document.getElementById('st-text').innerText = "¡Finalizado!";
            } catch (e) {
                document.getElementById('log').innerHTML += `<div style="color:#ef4444">> ERROR: ${e.message}</div>`;
            } finally {
                btn.forEach(b => b.disabled = false);
            }
        }
        window.run = run;
    </script>
</body>
</html>
