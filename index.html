<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FFmpeg Studio Web - GitHub Fix</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; transition: 0.3s; }
        .btn-blue { background: #2563eb; } .btn-blue:hover { background: #1d4ed8; }
        .btn-teal { background: #0d9488; } .btn-teal:hover { background: #0f766e; }
        #log { background: #000; color: #10b981; font-family: monospace; font-size: 11px; height: 120px; overflow-y: auto; padding: 10px; border-radius: 8px; margin-top: 20px; }
        video { width: 100%; background: #000; border-radius: 8px; aspect-ratio: 16/9; }
        .progress-bar { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin: 15px 0; }
        #fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }
        .badge { font-size: 10px; padding: 4px 8px; border-radius: 20px; font-weight: bold; }
        .red { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .green { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0 italic">FFMPEG<span style="color:var(--accent)">.STUDIO</span></h1>
            <span id="status-badge" class="badge red">SEGURIDAD BLOQUEADA</span>
        </div>

        <div class="grid">
            <div class="space-y">
                <div class="card">
                    <h3 style="margin-top:0; font-size: 12px; color: #94a3b8;">1. ARCHIVOS</h3>
                    <input type="file" id="f-main" style="font-size: 11px; margin-bottom: 10px; display: block;">
                    <input type="file" id="f-audio" style="font-size: 11px; display: block;">
                </div>
                <div class="card" style="margin-top:20px">
                    <h3 style="margin-top:0; font-size: 12px; color: #94a3b8;">2. ACCIONES</h3>
                    <button onclick="run('merge')" class="btn btn-blue">Unir Foto + Audio</button>
                    <button onclick="run('gif')" class="btn btn-teal">Convertir a GIF</button>
                </div>
            </div>

            <div>
                <video id="player" controls></video>
                <div class="progress-bar"><div id="fill"></div></div>
                <div id="log"> Esperando archivos...</div>
                <a id="dl" style="display:none; background:#fff; color:#000; text-align:center; padding:10px; border-radius:8px; margin-top:10px; text-decoration:none; font-weight:bold; font-size:12px;">DESCARGAR RESULTADO</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/esm/index.js';
        import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        
        if (window.crossOriginIsolated) {
            document.getElementById('status-badge').innerText = "SEGURIDAD ACTIVA";
            document.getElementById('status-badge').className = "badge green";
        }

        async function run(mode) {
            const file = document.getElementById('f-main').files[0];
            if (!file) return alert("Selecciona un archivo");

            try {
                if (!ffmpeg.loaded) {
                    await ffmpeg.load({
                        coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
                    });
                }

                ffmpeg.on('progress', ({ progress }) => {
                    document.getElementById('fill').style.width = `${progress * 100}%`;
                });

                ffmpeg.on('log', ({ message }) => {
                    const l = document.getElementById('log');
                    l.innerHTML += `<div>> ${message}</div>`;
                    l.scrollTop = l.scrollHeight;
                });

                await ffmpeg.writeFile('input', await fetchFile(file));
                let cmd = [], out = 'out.mp4';

                if (mode === 'merge') {
                    const aud = document.getElementById('f-audio').files[0];
                    await ffmpeg.writeFile('aud', await fetchFile(aud));
                    cmd = ['-loop', '1', '-i', 'input', '-i', 'aud', '-c:v', 'libx264', '-shortest', out];
                } else {
                    out = 'out.gif';
                    cmd = ['-i', 'input', '-vf', 'fps=10,scale=480:-1', out];
                }

                await ffmpeg.exec(cmd);
                const data = await ffmpeg.readFile(out);
                const url = URL.createObjectURL(new Blob([data.buffer], { type: mode==='gif'?'image/gif':'video/mp4' }));
                
                document.getElementById('player').src = url;
                const dl = document.getElementById('dl');
                dl.href = url; dl.download = out; dl.style.display = 'block';

            } catch (e) { console.error(e); }
        }
        window.run = run;
    </script>
</body>
</html>
