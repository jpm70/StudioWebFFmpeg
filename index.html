<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFmpeg Studio Web - GitHub Pages</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #console { font-family: 'Courier New', monospace; background: #0d1117; color: #39d353; height: 180px; overflow-y: auto; border: 1px solid #30363d; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-[#010409] text-gray-300 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex items-center justify-between border-b border-gray-800 pb-4">
            <h1 class="text-2xl font-black text-white flex items-center gap-2">
                <span class="text-blue-500">🎬</span> FFmpeg Studio <span class="text-xs bg-blue-600 text-white px-2 py-0.5 rounded ml-2">v0.12</span>
            </h1>
            <p class="text-sm text-gray-500 hidden md:block">Procesamiento local 100% gratuito</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <div class="bg-[#161b22] p-5 rounded-xl border border-gray-800 shadow-sm">
                    <h2 class="text-sm font-bold uppercase text-gray-400 mb-4 tracking-tighter">1. Cargar Medios</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Video o Imagen Principal</label>
                            <input type="file" id="input-file" class="w-full text-xs text-gray-400 file:bg-blue-600 file:text-white file:border-0 file:px-3 file:py-2 file:rounded file:mr-2 cursor-pointer">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Audio (Solo para Unir)</label>
                            <input type="file" id="audio-file" class="w-full text-xs text-gray-400 file:bg-green-600 file:text-white file:border-0 file:px-3 file:py-2 file:rounded file:mr-2 cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="bg-[#161b22] p-5 rounded-xl border border-gray-800 shadow-sm">
                    <h2 class="text-sm font-bold uppercase text-gray-400 mb-4 tracking-tighter">2. Acciones</h2>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="process('merge')" class="bg-blue-600 hover:bg-blue-500 py-2 rounded text-sm font-bold transition btn-active">📸 Unir Foto + Audio</button>
                        <button onclick="process('trim')" class="bg-orange-600 hover:bg-orange-500 py-2 rounded text-sm font-bold transition btn-active">✂️ Cortar (10 a 20s)</button>
                        <button onclick="process('text')" class="bg-purple-600 hover:bg-purple-500 py-2 rounded text-sm font-bold transition btn-active">✍️ Añadir Texto</button>
                        <button onclick="process('gif')" class="bg-teal-600 hover:bg-teal-500 py-2 rounded text-sm font-bold transition btn-active">🖼️ Convertir a GIF</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="space-y-2">
                    <div id="console" class="p-4 text-xs rounded-lg shadow-inner">
                        <span class="text-gray-500">>> Esperando archivos y acción...</span>
                    </div>
                    <div class="h-1.5 w-full bg-gray-800 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all"></div>
                    </div>
                </div>

                <div class="bg-[#161b22] p-2 rounded-xl border border-gray-800 flex flex-col items-center">
                    <video id="output-video" controls class="w-full rounded-lg bg-black aspect-video shadow-2xl"></video>
                    <a id="download-link" class="hidden mt-4 w-full text-center bg-white text-black py-3 rounded-lg font-black uppercase tracking-widest hover:bg-gray-200 transition">Descargar Archivo</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/esm/index.js';
        import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        const logger = document.getElementById('console');
        const progress = document.getElementById('progress-bar');

        function log(msg) {
            logger.innerHTML += `<div class="mb-1"><span class="text-blue-400">#</span> ${msg}</div>`;
            logger.scrollTop = logger.scrollHeight;
        }

        async function process(type) {
            const mainFile = document.getElementById('input-file').files[0];
            const audioFile = document.getElementById('audio-file').files[0];

            if (!mainFile) return alert("Selecciona el archivo principal");

            try {
                if (!ffmpeg.loaded) {
                    log("Cargando motor FFmpeg (aprox. 30MB)...");
                    await ffmpeg.load({
                        coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
                    });
                    ffmpeg.on('log', ({ message }) => log(message));
                    ffmpeg.on('progress', ({ progress: p }) => {
                        progress.style.width = `${p * 100}%`;
                    });
                }

                log("Subiendo archivos al sistema virtual...");
                await ffmpeg.writeFile('input_src', await fetchFile(mainFile));

                let command = [];
                let outputName = 'output.mp4';
                let mimeType = 'video/mp4';

                if (type === 'merge') {
                    if (!audioFile) throw new Error("Necesitas un audio para unirlo a la imagen");
                    await ffmpeg.writeFile('audio_src', await fetchFile(audioFile));
                    command = ['-loop', '1', '-i', 'input_src', '-i', 'audio_src', '-c:v', 'libx264', '-tune', 'stillimage', '-c:a', 'aac', '-b:a', '192k', '-pix_fmt', 'yuv420p', '-shortest', 'output.mp4'];
                } else if (type === 'trim') {
                    command = ['-i', 'input_src', '-ss', '00:00:10', '-to', '00:01:20', '-c', 'copy', 'output.mp4'];
                } else if (type === 'text') {
                    command = ['-i', 'input_src', '-vf', "drawtext=text='PROCESADO EN WEB':x=(w-text_w)/2:y=h-80:fontsize=48:fontcolor=white:box=1:boxcolor=black@0.5", '-c:a', 'copy', 'output.mp4'];
                } else if (type === 'gif') {
                    outputName = 'output.gif';
                    mimeType = 'image/gif';
                    command = ['-i', 'input_src', '-vf', 'fps=10,scale=480:-1:flags=lanczos', '-c:v', 'gif', 'output.gif'];
                }

                log("Ejecutando FFmpeg... esto puede tardar según el tamaño del archivo.");
                await ffmpeg.exec(command);

                const data = await ffmpeg.readFile(outputName);
                const url = URL.createObjectURL(new Blob([data.buffer], { type: mimeType }));
                
                document.getElementById('output-video').src = url;
                const dl = document.getElementById('download-link');
                dl.href = url;
                dl.download = outputName;
                dl.classList.remove('hidden');
                log("<b>¡Hecho! El resultado está listo abajo.</b>");

            } catch (err) {
                log(`<span class="text-red-500 italic">Error: ${err.message}</span>`);
            }
        }

        window.process = process;
    </script>
</body>
</html>
