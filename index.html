<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FFmpeg Studio - Master Fix</title>
    <script>
        if (!window.crossOriginIsolated) {
            console.log("Detectado entorno no seguro. Instalando Service Worker...");
            const swCode = `
                self.addEventListener("install", () => self.skipWaiting());
                self.addEventListener("activate", (e) => e.waitUntil(self.clients.claim()));
                self.addEventListener("fetch", (e) => {
                    if (e.request.cache === "only-if-cached" && e.request.mode !== "same-origin") return;
                    e.respondWith(fetch(e.request).then((r) => {
                        if (r.status === 0) return r;
                        const h = new Headers(r.headers);
                        h.set("Cross-Origin-Embedder-Policy", "require-corp");
                        h.set("Cross-Origin-Opener-Policy", "same-origin");
                        return new Response(r.body, { status: r.status, statusText: r.statusText, headers: h });
                    }));
                });`;
            const blob = new Blob([swCode], { type: "text/javascript" });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).then(() => {
                setTimeout(() => location.reload(), 1000);
            });
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e14; color: #cbd5e1; font-family: system-ui, sans-serif; }
        .glass { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        #console { background: #000; color: #00ff00; font-family: monospace; font-size: 11px; height: 150px; overflow-y: auto; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-5">
            <h1 class="text-2xl font-black italic">FFMPEG<span class="text-blue-500">.STUDIO</span></h1>
            <div class="flex items-center gap-4 bg-black/40 px-4 py-2 rounded-full border border-gray-800">
                <div class="flex items-center gap-2">
                    <span id="secure-dot" class="indicator bg-red-500"></span>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Seguridad</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="core-dot" class="indicator bg-red-500"></span>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Motor</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="glass p-6">
                    <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">1. Cargar Archivos</h2>
                    <div class="space-y-4">
                        <input type="file" id="main-file" class="w-full text-xs text-gray-400 file:bg-blue-600 file:text-white file:border-0 file:rounded-full file:px-4 file:py-1 cursor-pointer">
                        <input type="file" id="audio-file" class="w-full text-xs text-gray-400 file:bg-emerald-600 file:text-white file:border-0 file:rounded-full file:px-4 file:py-1 cursor-pointer">
                    </div>
                </div>

                <div class="glass p-6">
                    <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">2. Acciones Rápidas</h2>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="run('merge')" class="bg-gray-800 hover:bg-blue-600 p-3 rounded-lg font-bold text-sm transition">📸 Unir Multimedia</button>
                        <button onclick="run('gif')" class="bg-gray-800 hover:bg-teal-600 p-3 rounded-lg font-bold text-sm transition">🖼️ Crear GIF</button>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass overflow-hidden shadow-2xl relative">
                    <video id="player" controls class="w-full bg-black aspect-video"></video>
                    <div id="loader" class="absolute inset-0 bg-black/80 flex items-center justify-center hidden">
                        <div class="flex flex-col items-center gap-3">
                            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                            <span class="text-xs font-black animate-pulse">PROCESANDO...</span>
                        </div>
                    </div>
                </div>
                
                <div id="console" class="p-3 rounded-lg border border-gray-800">
                    <div class="text-gray-500 italic">>> Esperando archivos...</div>
                </div>
                
                <a id="download" class="hidden w-full text-center bg-white text-black py-3 rounded-lg font-black uppercase text-xs tracking-widest hover:bg-blue-400 transition">Descargar Resultado</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/esm/index.js';
        import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        const con = document.getElementById('console');
        const loader = document.getElementById('loader');

        // Actualizar diagnóstico de seguridad
        if (window.crossOriginIsolated) {
            document.getElementById('secure-dot').className = "indicator bg-green-500 shadow-[0_0_10px_#10b981]";
        }

        function log(msg) {
            const line = document.createElement('div');
            line.className = "border-b border-gray-900 pb-1 mb-1";
            line.innerHTML = `<span class="text-gray-600">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            con.appendChild(line);
            con.scrollTop = con.scrollHeight;
        }

        async function run(mode) {
            const main = document.getElementById('main-file').files[0];
            if (!main) return alert("Selecciona un archivo principal");

            loader.classList.remove('hidden');

            try {
                if (!ffmpeg.loaded) {
                    log("Iniciando motor FFmpeg...");
                    await ffmpeg.load({
                        coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
                    });
                    document.getElementById('core-dot').className = "indicator bg-green-500 shadow-[0_0_10px_#10b981]";
                }

                ffmpeg.on('log', ({ message }) => log(message));

                log("Subiendo archivos al sistema...");
                await ffmpeg.writeFile('in_file', await fetchFile(main));

                let cmd = [];
                let out = 'out.mp4';
                let type = 'video/mp4';

                if (mode === 'merge') {
                    const audio = document.getElementById('audio-file').files[0];
                    if (!audio) throw new Error("Falta archivo de audio.");
                    await ffmpeg.writeFile('aud_file', await fetchFile(audio));
                    cmd = ['-loop', '1', '-i', 'in_file', '-i', 'aud_file', '-c:v', 'libx264', '-tune', 'stillimage', '-c:a', 'aac', '-b:a', '192k', '-pix_fmt', 'yuv420p', '-shortest', out];
                } else if (mode === 'gif') {
                    out = 'out.gif'; type = 'image/gif';
                    cmd = ['-i', 'in_file', '-vf', 'fps=10,scale=480:-1:flags=lanczos', out];
                }

                log("<b>Ejecutando proceso...</b>");
                await ffmpeg.exec(cmd);

                const data = await ffmpeg.readFile(out);
                const url = URL.createObjectURL(new Blob([data.buffer], { type }));
                
                document.getElementById('player').src = url;
                const dl = document.getElementById('download');
                dl.href = url;
                dl.download = out;
                dl.classList.remove('hidden');
                log("<span class='text-blue-400 font-bold'>¡ÉXITO! Ya puedes descargar el archivo.</span>");

            } catch (err) {
                log(`<span class="text-red-500">Error: ${err.message}</span>`);
                console.error(err);
            } finally {
                loader.classList.add('hidden');
            }
        }
        window.run = run;
    </script>
</body>
</html>
