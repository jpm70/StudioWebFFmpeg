<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFmpeg Studio Pro</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        #console { font-family: 'ui-monospace', monospace; background: #020617; color: #10b981; }
        .loader-bar { height: 4px; background: #3b82f6; transition: width 0.3s ease; width: 0%; }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tight italic">FFMPEG<span class="text-blue-500 text-2xl not-italic">.STUDIO</span></h1>
                <p class="text-slate-400 text-sm">Edición de video de alto rendimiento directamente en tu navegador.</p>
            </div>
            <div id="status-badge" class="px-3 py-1 rounded-full bg-red-500/10 text-red-500 border border-red-500/20 text-xs font-bold w-fit">
                NÚCLEO DESCONECTADO
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <section class="glass p-6 rounded-2xl shadow-2xl">
                    <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">1. Cargar Archivos</h2>
                    <div class="space-y-4">
                        <div class="group">
                            <label class="block text-sm font-bold mb-2 group-hover:text-blue-400 transition">Video / Imagen Base</label>
                            <input type="file" id="input-file" class="block w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer transition">
                        </div>
                        <div class="group">
                            <label class="block text-sm font-bold mb-2 group-hover:text-green-400 transition">Audio Complementario</label>
                            <input type="file" id="audio-file" class="block w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-emerald-600 file:text-white hover:file:bg-emerald-500 cursor-pointer transition">
                        </div>
                    </div>
                </section>

                <section class="glass p-6 rounded-2xl shadow-2xl">
                    <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">2. Herramientas</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="process('merge')" class="w-full py-3 rounded-xl bg-slate-700 hover:bg-blue-600 font-bold transition-all transform hover:-translate-y-1 shadow-lg">📸 Unir Multimedia</button>
                        <button onclick="process('trim')" class="w-full py-3 rounded-xl bg-slate-700 hover:bg-orange-600 font-bold transition-all transform hover:-translate-y-1 shadow-lg">✂️ Cortar (10-20s)</button>
                        <button onclick="process('text')" class="w-full py-3 rounded-xl bg-slate-700 hover:bg-purple-600 font-bold transition-all transform hover:-translate-y-1 shadow-lg">✍️ Marca de Agua</button>
                        <button onclick="process('gif')" class="w-full py-3 rounded-xl bg-slate-700 hover:bg-teal-600 font-bold transition-all transform hover:-translate-y-1 shadow-lg">🖼️ Generar GIF</button>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="glass rounded-2xl overflow-hidden shadow-2xl">
                    <div class="bg-black aspect-video flex items-center justify-center relative">
                        <video id="output-video" controls class="w-full h-full object-contain"></video>
                        <div id="processing-overlay" class="absolute inset-0 bg-black/80 hidden flex-col items-center justify-center space-y-4">
                            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                            <p class="text-blue-500 font-black tracking-widest animate-pulse">PROCESANDO...</p>
                        </div>
                    </div>
                    <div class="p-4 border-t border-white/5 flex justify-between items-center">
                        <span class="text-xs text-slate-500 font-mono" id="file-info">Sin archivos procesados</span>
                        <a id="download-link" class="hidden text-xs font-black bg-white text-black px-4 py-2 rounded-full hover:bg-blue-400 transition shadow-xl">DESCARGAR RESULTADO</a>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="w-full bg-slate-800 rounded-full overflow-hidden">
                        <div id="progress-bar" class="loader-bar"></div>
                    </div>
                    <div id="console" class="p-4 text-[10px] rounded-xl h-40 overflow-y-auto border border-white/5 shadow-inner">
                        <span class="text-slate-500 italic">>> Sistema listo. Cargue archivos para comenzar...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/esm/index.js';
        import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        const logger = document.getElementById('console');
        const progress = document.getElementById('progress-bar');
        const overlay = document.getElementById('processing-overlay');
        const badge = document.getElementById('status-badge');

        function log(msg) {
            const entry = document.createElement('div');
            entry.className = 'mb-1 border-l-2 border-slate-700 pl-2';
            entry.innerHTML = `<span class="text-slate-600">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            logger.appendChild(entry);
            logger.scrollTop = logger.scrollHeight;
        }

        async function process(type) {
            const mainFile = document.getElementById('input-file').files[0];
            const audioFile = document.getElementById('audio-file').files[0];

            if (!mainFile) return alert("Error: Selecciona un archivo principal.");

            try {
                overlay.classList.remove('hidden');
                
                if (!ffmpeg.loaded) {
                    log("Iniciando descarga del motor FFmpeg (Carga única de 30MB)...");
                    await ffmpeg.load({
                        coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
                        wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.wasm'
                    });
                    badge.innerHTML = "MOTOR ACTIVO";
                    badge.className = "px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 text-xs font-bold w-fit";
                }

                ffmpeg.on('log', ({ message }) => log(message));
                ffmpeg.on('progress', ({ progress: p }) => {
                    progress.style.width = `${p * 100}%`;
                });

                log("Importando archivos...");
                await ffmpeg.writeFile('input_src', await fetchFile(mainFile));

                let command = [];
                let outputName = 'output.mp4';
                let mimeType = 'video/mp4';

                switch(type) {
                    case 'merge':
                        if (!audioFile) throw new Error("Se requiere archivo de audio.");
                        await ffmpeg.writeFile('audio_src', await fetchFile(audioFile));
                        command = ['-loop', '1', '-i', 'input_src', '-i', 'audio_src', '-c:v', 'libx264', '-tune', 'stillimage', '-c:a', 'aac', '-b:a', '192k', '-pix_fmt', 'yuv420p', '-shortest', 'output.mp4'];
                        break;
                    case 'trim':
                        command = ['-i', 'input_src', '-ss', '00:00:10', '-to', '00:00:20', '-c:v', 'libx264', '-c:a', 'aac', 'output.mp4'];
                        break;
                    case 'text':
                        command = ['-i', 'input_src', '-vf', "drawtext=text='FFMPEG STUDIO':x=(w-text_w)/2:y=h-80:fontsize=40:fontcolor=white:box=1:boxcolor=black@0.4", '-c:a', 'copy', 'output.mp4'];
                        break;
                    case 'gif':
                        outputName = 'output.gif'; mimeType = 'image/gif';
                        command = ['-i', 'input_src', '-vf', 'fps=10,scale=480:-1:flags=lanczos', 'output.gif'];
                        break;
                }

                log("Procesando comando FFmpeg...");
                await ffmpeg.exec(command);

                const data = await ffmpeg.readFile(outputName);
                const url = URL.createObjectURL(new Blob([data.buffer], { type: mimeType }));
                
                document.getElementById('output-video').src = url;
                const dl = document.getElementById('download-link');
                dl.href = url;
                dl.download = outputName;
                dl.classList.remove('hidden');
                document.getElementById('file-info').innerText = `Éxito: ${outputName}`;
                log("<span class='text-emerald-400 font-bold'>PROCESO COMPLETADO EXITOSAMENTE.</span>");

            } catch (err) {
                log(`<span class="text-red-500 underline">ERROR: ${err.message}</span>`);
            } finally {
                overlay.classList.add('hidden');
                progress.style.width = '0%';
            }
        }
        window.process = process;
    </script>
</body>
</html>
